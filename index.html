<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>聖言研讀 · 直接可用版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f2ecdf; font-family: system-ui, 'Segoe UI', 'Noto Sans CJK TC', sans-serif; color: #2e2a24; padding: 12px 12px 90px 12px; }
        .app { max-width: 700px; margin: 0 auto; }
        .toolbar { background: #fffaf2; border-radius: 32px; box-shadow: 0 8px 18px rgba(0,0,0,0.08); padding: 12px 16px; margin-bottom: 16px; border: 1px solid #e7d8c4; }
        .row-selectors { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .selector-group { background: #f5ede2; border-radius: 40px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; }
        .selector-group i { color: #a88762; }
        select { background: transparent; border: none; font-size: 0.9rem; padding: 8px 4px; }
        .chapter-scroll { margin-top: 12px; overflow-x: auto; white-space: nowrap; }
        .chapter-list { display: inline-flex; gap: 8px; }
        .chap { background: #faf3e9; border-radius: 40px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; }
        .chap.active { background: #b69060; color: white; }
        .version-card { background: #fffdf9; border-radius: 36px; margin-bottom: 20px; padding: 16px 18px; box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .version-title { font-size: 1.35rem; font-weight: 700; color: #735e44; border-left: 5px solid #c7a16b; padding-left: 12px; margin-bottom: 12px; }
        .verse-item { display: flex; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #f2e6da; }
        .verse-number { width: 32px; background: #f4ede3; border-radius: 30px; text-align: center; font-size: 0.7rem; margin-right: 12px; cursor: pointer; flex-shrink: 0; }
        .verse-text { flex: 1; line-height: 1.5; }
        .strong { background: #e7dbcd; border-radius: 30px; padding: 2px 8px; font-size: 0.68rem; cursor: pointer; display: inline-block; margin: 0 2px; }
        .fab-container { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 14px; z-index: 100; flex-wrap: wrap; }
        .fab { background: #fef7ed; backdrop-filter: blur(12px); border-radius: 60px; padding: 10px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: none; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #fffbf2; border-radius: 32px 32px 0 0; transition: transform 0.3s; transform: translateY(100%); z-index: 200; max-height: 70vh; overflow-y: auto; }
        .drawer.open { transform: translateY(0); }
        .drawer-header { padding: 18px 20px 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #e9dbc9; }
        .close-drawer { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .drawer-content { padding: 18px 20px 30px; }
        textarea { width: 100%; padding: 12px; border-radius: 24px; margin: 12px 0; border: 1px solid #e3d2be; }
        .small-btn { background: #dfcfba; border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; margin-right: 8px; }
        .search-panel { background: #fff7ef; border-radius: 28px; margin-bottom: 16px; padding: 12px; display: none; }
        .search-panel.open { display: block; }
        .search-input { width: 100%; padding: 12px; border-radius: 40px; border: 1px solid #ddcfbb; }
        .progress-tag { background: #e7dfd1; border-radius: 24px; padding: 4px 12px; font-size: 0.7rem; display: inline-block; }
        .ai-conversation { max-height: 300px; overflow-y: auto; background: #faf5ec; border-radius: 24px; padding: 12px; margin-bottom: 12px; }
        .ai-question { background: #e7ddcf; border-radius: 20px; padding: 8px 12px; margin: 6px 0; }
        .ai-answer { background: #fff3e4; border-radius: 20px; padding: 8px 12px; margin: 6px 0; }
    </style>
</head>
<body>
<div class="app">
    <div class="toolbar">
        <div class="row-selectors">
            <div class="selector-group"><i class="fas fa-scroll"></i><select id="bookSelect"></select></div>
            <div class="selector-group"><i class="fas fa-hashtag"></i><select id="chapterSelect"></select></div>
            <div class="progress-tag" id="progressLabel">讀經中</div>
        </div>
        <div class="chapter-scroll" id="chapterScroll"></div>
    </div>
    <div class="version-card"><div class="version-title">📖 和合本</div><div id="cuvVerses">載入中...</div></div>
    <div class="version-card"><div class="version-title">📜 King James Version</div><div id="kjvVerses">載入中...</div></div>
    <div id="searchPanel" class="search-panel"><input type="text" id="keywordInput" class="search-input" placeholder="搜尋關鍵字 (僅當前章節)"><div id="searchResult"></div></div>
    <div class="fab-container">
        <button class="fab" id="openLexiconBtn">📖 原文</button>
        <button class="fab" id="openNoteBtn">✏️ 筆記</button>
        <button class="fab" id="openSearchBtn">🔍 搜尋</button>
        <button class="fab" id="openAiBtn">🤖 AI</button>
    </div>
    <div id="lexiconDrawer" class="drawer"><div class="drawer-header"><span>Strong 簡明詞典</span><button class="close-drawer" data-drawer="lexicon">✕</button></div><div class="drawer-content" id="lexiconContent">點擊經文中的編號 (例如 H430) 顯示字義。</div></div>
    <div id="noteDrawer" class="drawer"><div class="drawer-header"><span>筆記與書籤</span><button class="close-drawer" data-drawer="note">✕</button></div><div class="drawer-content"><div>當前經節：<span id="currentVerseRef"></span></div><textarea id="noteContent" rows="3"></textarea><button id="saveNote" class="small-btn">儲存筆記</button><button id="addBookmark" class="small-btn">加入書籤</button><div id="bookmarkList" style="margin-top:12px;"></div></div></div>
    <div id="aiDrawer" class="drawer"><div class="drawer-header"><span>DeepSeek AI 助理</span><button class="close-drawer" data-drawer="ai">✕</button></div><div class="drawer-content"><div class="ai-conversation" id="aiChatLog"></div><input type="password" id="apiKeyInput" placeholder="輸入 DeepSeek API Key" style="width:100%; padding:8px; border-radius:40px; border:1px solid #ddcfbb; margin-bottom:8px;"><button id="saveApiKey" class="small-btn">儲存 Key</button><textarea id="aiQuestion" rows="2" placeholder="例如：什麼是『恩典』？"></textarea><button id="askAiBtn" class="small-btn">發問</button></div></div>
</div>
<script>
    // ---------- 聖經書卷列表 (66卷) ----------
    const books = ["創世記","出埃及記","利未記","民數記","申命記","約書亞記","士師記","路得記","撒母耳記上","撒母耳記下","列王紀上","列王紀下","歷代志上","歷代志下","以斯拉記","尼希米記","以斯帖記","約伯記","詩篇","箴言","傳道書","雅歌","以賽亞書","耶利米書","耶利米哀歌","以西結書","但以理書","何西阿書","約珥書","阿摩司書","俄巴底亞書","約拿書","彌迦書","那鴻書","哈巴谷書","西番雅書","哈該書","撒迦利亞書","瑪拉基書","馬太福音","馬可福音","路加福音","約翰福音","使徒行傳","羅馬書","哥林多前書","哥林多後書","加拉太書","以弗所書","腓立比書","歌羅西書","帖撒羅尼迦前書","帖撒羅尼迦後書","提摩太前書","提摩太後書","提多書","腓利門書","希伯來書","雅各書","彼得前書","彼得後書","約翰一書","約翰二書","約翰三書","猶大書","啟示錄"];
    // 簡單的章節數映射 (未完全，但常用書卷已設)
    const maxChapters = { "創世記":50,"出埃及記":40,"利未記":27,"民數記":36,"申命記":34,"約書亞記":24,"士師記":21,"路得記":4,"撒母耳記上":31,"撒母耳記下":24,"列王紀上":22,"列王紀下":25,"歷代志上":29,"歷代志下":36,"以斯拉記":10,"尼希米記":13,"以斯帖記":10,"約伯記":42,"詩篇":150,"箴言":31,"傳道書":12,"雅歌":8,"以賽亞書":66,"耶利米書":52,"耶利米哀歌":5,"以西結書":48,"但以理書":12,"何西阿書":14,"約珥書":3,"阿摩司書":9,"俄巴底亞書":1,"約拿書":4,"彌迦書":7,"那鴻書":3,"哈巴谷書":3,"西番雅書":3,"哈該書":2,"撒迦利亞書":14,"瑪拉基書":4,"馬太福音":28,"馬可福音":16,"路加福音":24,"約翰福音":21,"使徒行傳":28,"羅馬書":16,"哥林多前書":16,"哥林多後書":13,"加拉太書":6,"以弗所書":6,"腓立比書":4,"歌羅西書":4,"帖撒羅尼迦前書":5,"帖撒羅尼迦後書":3,"提摩太前書":6,"提摩太後書":4,"提多書":3,"腓利門書":1,"希伯來書":13,"雅各書":5,"彼得前書":5,"彼得後書":3,"約翰一書":5,"約翰二書":1,"約翰三書":1,"猶大書":1,"啟示錄":22 };
    function getMaxChapter(book) { return maxChapters[book] || 30; }

    let currentBook = "創世記";
    let currentChapter = 1;
    let currentVerse = 1;
    let notes = JSON.parse(localStorage.getItem("bible_notes") || "{}");
    let bookmarks = JSON.parse(localStorage.getItem("bible_bookmarks") || "[]");
    let cuvData = {}, kjvData = {};

    // 簡易 Strong 詞典 (常用詞)
    const strongDict = {
        H430: { meaning: "神，大能者", original: "אֱלֹהִים" },
        H7307: { meaning: "靈，風，氣息", original: "רוּחַ" },
        H1254: { meaning: "創造", original: "בָּרָא" },
        H3068: { meaning: "耶和華", original: "יהוה" }
    };

    // 載入經文 (使用 bible-api.com，支援跨域)
    async function loadChapter() {
        const engBook = convertBookToEnglish(currentBook);
        if (!engBook) return;
        // 和合本
        const cuvUrl = `https://bible-api.com/${engBook}+${currentChapter}?translation=cuv`;
        try {
            const res = await fetch(cuvUrl);
            const data = await res.json();
            if (data.verses) {
                cuvData = data.verses;
                renderVerses(cuvData, "cuvVerses", true);
            } else throw new Error();
        } catch(e) { document.getElementById("cuvVerses").innerHTML = "無法載入和合本，請檢查網路。"; }
        // KJV
        const kjvUrl = `https://bible-api.com/${engBook}+${currentChapter}?translation=kjv`;
        try {
            const res = await fetch(kjvUrl);
            const data = await res.json();
            if (data.verses) {
                kjvData = data.verses;
                renderVerses(kjvData, "kjvVerses", false);
            } else throw new Error();
        } catch(e) { document.getElementById("kjvVerses").innerHTML = "無法載入KJV，請檢查網路。"; }
        updateLastRead();
    }

    function convertBookToEnglish(book) {
        const map = { "創世記":"Genesis","出埃及記":"Exodus","利未記":"Leviticus","民數記":"Numbers","申命記":"Deuteronomy","約書亞記":"Joshua","士師記":"Judges","路得記":"Ruth","撒母耳記上":"1 Samuel","撒母耳記下":"2 Samuel","列王紀上":"1 Kings","列王紀下":"2 Kings","歷代志上":"1 Chronicles","歷代志下":"2 Chronicles","以斯拉記":"Ezra","尼希米記":"Nehemiah","以斯帖記":"Esther","約伯記":"Job","詩篇":"Psalms","箴言":"Proverbs","傳道書":"Ecclesiastes","雅歌":"Song of Solomon","以賽亞書":"Isaiah","耶利米書":"Jeremiah","耶利米哀歌":"Lamentations","以西結書":"Ezekiel","但以理書":"Daniel","何西阿書":"Hosea","約珥書":"Joel","阿摩司書":"Amos","俄巴底亞書":"Obadiah","約拿書":"Jonah","彌迦書":"Micah","那鴻書":"Nahum","哈巴谷書":"Habakkuk","西番雅書":"Zephaniah","哈該書":"Haggai","撒迦利亞書":"Zechariah","瑪拉基書":"Malachi","馬太福音":"Matthew","馬可福音":"Mark","路加福音":"Luke","約翰福音":"John","使徒行傳":"Acts","羅馬書":"Romans","哥林多前書":"1 Corinthians","哥林多後書":"2 Corinthians","加拉太書":"Galatians","以弗所書":"Ephesians","腓立比書":"Philippians","歌羅西書":"Colossians","帖撒羅尼迦前書":"1 Thessalonians","帖撒羅尼迦後書":"2 Thessalonians","提摩太前書":"1 Timothy","提摩太後書":"2 Timothy","提多書":"Titus","腓利門書":"Philemon","希伯來書":"Hebrews","雅各書":"James","彼得前書":"1 Peter","彼得後書":"2 Peter","約翰一書":"1 John","約翰二書":"2 John","約翰三書":"3 John","猶大書":"Jude","啟示錄":"Revelation" };
        return map[book];
    }

    function renderVerses(verses, containerId, isCuv) {
        let html = "";
        verses.forEach(v => {
            let text = v.text;
            if (isCuv) {
                // 手動標記常見 Strong 詞彙 (簡單實作)
                text = text.replace(/神/g, '<span class="strong" data-strong="H430">神</span>');
                text = text.replace(/靈/g, '<span class="strong" data-strong="H7307">靈</span>');
            }
            const selected = (currentVerse === v.verse) ? 'style="background:#fff0e0; border-radius:20px;"' : '';
            html += `<div class="verse-item" data-verse="${v.verse}" ${selected}>
                        <span class="verse-number" data-verse="${v.verse}">${v.verse}</span>
                        <div class="verse-text">${text}</div>
                     </div>`;
        });
        document.getElementById(containerId).innerHTML = html;
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll(".strong").forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); const s = el.getAttribute("data-strong"); showLexicon(s); };
        });
        document.querySelectorAll(".verse-number").forEach(el => {
            el.onclick = () => { currentVerse = parseInt(el.getAttribute("data-verse")); loadChapter(); loadNote(); };
        });
    }

    function showLexicon(strongId) {
        const def = strongDict[strongId];
        const content = def ? `<strong>${strongId}</strong><br>原文：${def.original}<br>字義：${def.meaning}` : `未收錄 ${strongId}，可詢問AI。`;
        document.getElementById("lexiconContent").innerHTML = content;
        document.getElementById("lexiconDrawer").classList.add("open");
    }

    function loadNote() { const key = `${currentBook} ${currentChapter}:${currentVerse}`; document.getElementById("noteContent").value = notes[key] || ""; document.getElementById("currentVerseRef").innerText = key; }
    function saveNote() { const key = `${currentBook} ${currentChapter}:${currentVerse}`; const content = document.getElementById("noteContent").value; if(content) notes[key] = content; else delete notes[key]; localStorage.setItem("bible_notes", JSON.stringify(notes)); alert("筆記已儲存"); }
    function addBookmark() { const ref = `${currentBook} ${currentChapter}:${currentVerse}`; if(!bookmarks.includes(ref)) bookmarks.push(ref); localStorage.setItem("bible_bookmarks", JSON.stringify(bookmarks)); refreshBookmarks(); }
    function refreshBookmarks() { const div = document.getElementById("bookmarkList"); div.innerHTML = bookmarks.map(ref => `<div style="cursor:pointer; margin:4px 0;" onclick="jumpTo('${ref}')">📖 ${ref}</div>`).join(""); }
    window.jumpTo = function(ref) { const m = ref.match(/(.+?) (\d+):(\d+)/); if(m) { currentBook = m[1]; currentChapter = parseInt(m[2]); currentVerse = parseInt(m[3]); document.getElementById("bookSelect").value = currentBook; document.getElementById("chapterSelect").value = currentChapter; loadChapter(); } };
    function updateLastRead() { localStorage.setItem("lastRead", `${currentBook} ${currentChapter}:${currentVerse}`); document.getElementById("progressLabel").innerHTML = `上次：${localStorage.getItem("lastRead")}`; }

    // AI 功能
    let apiKey = localStorage.getItem("deepseek_key") || "";
    document.getElementById("apiKeyInput").value = apiKey;
    document.getElementById("saveApiKey").onclick = () => { localStorage.setItem("deepseek_key", document.getElementById("apiKeyInput").value); apiKey = document.getElementById("apiKeyInput").value; alert("Key 已儲存"); };
    document.getElementById("askAiBtn").onclick = async () => {
        const question = document.getElementById("aiQuestion").value.trim();
        if(!question) return;
        if(!apiKey) { alert("請先輸入 DeepSeek API Key"); return; }
        const chat = document.getElementById("aiChatLog");
        chat.innerHTML += `<div class="ai-question"><strong>你：</strong> ${question}</div>`;
        document.getElementById("aiQuestion").value = "";
        try {
            const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "user", content: `請用繁體中文回答聖經問題：${question}` }] })
            });
            const data = await res.json();
            const answer = data.choices?.[0]?.message?.content || "無回應";
            chat.innerHTML += `<div class="ai-answer"><strong>AI：</strong> ${answer}</div>`;
            chat.scrollTop = chat.scrollHeight;
        } catch(e) { chat.innerHTML += `<div class="ai-answer">錯誤：${e.message}</div>`; }
    };

    // UI 初始化
    function initUI() {
        const bookSel = document.getElementById("bookSelect");
        bookSel.innerHTML = books.map(b => `<option value="${b}">${b}</option>`).join("");
        bookSel.value = currentBook;
        bookSel.onchange = () => { currentBook = bookSel.value; currentChapter = 1; currentVerse = 1; loadChapter(); updateChapterSelect(); };
        const chapSel = document.getElementById("chapterSelect");
        function updateChapterSelect() {
            const max = getMaxChapter(currentBook);
            chapSel.innerHTML = Array.from({length: max}, (_,i) => `<option value="${i+1}">${i+1}</option>`).join("");
            chapSel.value = currentChapter;
            chapSel.onchange = () => { currentChapter = parseInt(chapSel.value); currentVerse = 1; loadChapter(); };
            const scrollDiv = document.getElementById("chapterScroll");
            scrollDiv.innerHTML = `<div class="chapter-list">${Array.from({length:max}, (_,i)=>`<div class="chap ${i+1===currentChapter?'active':''}" data-chap="${i+1}">${i+1}</div>`).join('')}</div>`;
            document.querySelectorAll(".chap").forEach(el => el.onclick = () => { currentChapter = parseInt(el.dataset.chap); chapSel.value = currentChapter; loadChapter(); });
        }
        updateChapterSelect();
        loadChapter();
    }

    document.getElementById("openLexiconBtn").onclick = () => document.getElementById("lexiconDrawer").classList.add("open");
    document.getElementById("openNoteBtn").onclick = () => { document.getElementById("noteDrawer").classList.add("open"); refreshBookmarks(); loadNote(); };
    document.getElementById("openSearchBtn").onclick = () => document.getElementById("searchPanel").classList.toggle("open");
    document.getElementById("openAiBtn").onclick = () => document.getElementById("aiDrawer").classList.add("open");
    document.querySelectorAll(".close-drawer").forEach(btn => btn.onclick = () => document.getElementById(`${btn.dataset.drawer}Drawer`).classList.remove("open"));
    document.getElementById("saveNote").onclick = saveNote;
    document.getElementById("addBookmark").onclick = addBookmark;
    document.getElementById("keywordInput").addEventListener("input", (e) => {
        const kw = e.target.value.toLowerCase();
        if(!kw) { document.getElementById("searchResult").innerHTML = ""; return; }
        let results = [];
        if(cuvData) cuvData.forEach(v => { if(v.text.toLowerCase().includes(kw)) results.push(`和合本 ${currentBook} ${currentChapter}:${v.verse} - ${v.text.substring(0,80)}`); });
        if(kjvData) kjvData.forEach(v => { if(v.text.toLowerCase().includes(kw)) results.push(`KJV ${currentBook} ${currentChapter}:${v.verse} - ${v.text.substring(0,80)}`); });
        document.getElementById("searchResult").innerHTML = results.map(r => `<div style="margin:6px 0;">🔍 ${r}</div>`).join("");
    });

    initUI();
    refreshBookmarks();
</script>
</body>
</html>
