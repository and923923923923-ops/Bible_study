<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>聖經研讀工具</title>
<style>
:root {
--bg-color: #f4eee1; /* 溫柔奶油底色 /
--card-bg: #fffbf5; / 卡片溫暖米白 /
--text-main: #5c4033; / 深棕色文字 /
--accent-color: #c9a074; / 質感金棕色 /
--active-num-bg: #b08968; / 作用中數字顏色 */
--shadow: 0 4px 12px rgba(92, 64, 51, 0.08);
}
* {
box-sizing: border-box;
margin: 0;
padding: 0;
-webkit-tap-highlight-color: transparent;
}
body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
display: flex;
flex-direction: column;
align-items: center;
padding: 15px;
min-height: 100vh;
padding-bottom: 100px;
}
.app-container {
width: 100%;
max-width: 500px;
display: flex;
flex-direction: column;
gap: 16px;
}
/* 上方選擇器卡片 */
.selector-card {
background-color: var(--card-bg);
border-radius: 24px;
padding: 16px;
box-shadow: var(--shadow);
}
.dropdown-row {
display: flex;
justify-content: space-between;
gap: 12px;
margin-bottom: 14px;
}
.custom-select {
flex: 1;
background-color: var(--bg-color);
border: none;
padding: 12px 16px;
border-radius: 16px;
font-size: 1rem;
font-weight: bold;
color: var(--text-main);
outline: none;
}
.history-tag {
display: inline-block;
background-color: rgba(92, 64, 51, 0.06);
padding: 4px 12px;
border-radius: 12px;
font-size: 0.8rem;
margin-bottom: 12px;
color: #8c7060;
}
.chapters-scroll {
display: flex;
gap: 10px;
overflow-x: auto;
padding-bottom: 4px;
}
.chapter-num {
min-width: 36px;
height: 36px;
background-color: rgba(92, 64, 51, 0.05);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.9rem;
font-weight: bold;
cursor: pointer;
}
.chapter-num.active {
background-color: var(--active-num-bg);
color: white;
}
/* 經文內容卡片 */
.bible-card {
background-color: var(--card-bg);
border-radius: 24px;
padding: 20px;
box-shadow: var(--shadow);
}
.version-title {
font-size: 1.15rem;
font-weight: 800;
border-left: 4px solid var(--accent-color);
padding-left: 8px;
margin-bottom: 16px;
}
.verse-list {
display: flex;
flex-direction: column;
gap: 12px;
}
.verse-item {
display: flex;
gap: 10px;
padding: 8px;
border-radius: 12px;
cursor: pointer;
transition: background 0.2s;
}
.verse-item:hover, .verse-item.selected {
background-color: rgba(201, 160, 116, 0.15);
}
.v-num {
background-color: #f5ebe0;
min-width: 24px;
height: 24px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.75rem;
font-weight: bold;
color: var(--accent-color);
}
.v-text {
font-size: 1.05rem;
line-height: 1.6;
flex: 1;
}
/* 底部懸浮導覽列 */
.bottom-nav {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
width: calc(100% - 30px);
max-width: 450px;
background-color: rgba(255, 251, 245, 0.9);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
border-radius: 30px;
padding: 10px 16px;
box-shadow: 0 8px 32px rgba(92, 64, 51, 0.15);
display: flex;
justify-content: space-around;
z-index: 999;
}
.nav-btn {
background: none;
border: none;
padding: 8px 14px;
font-size: 0.9rem;
font-weight: bold;
color: var(--text-main);
display: flex;
align-items: center;
gap: 6px;
cursor: pointer;
border-radius: 20px;
}
/* 彈出式 AI 助理視窗 */
.modal-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.4);
display: none;
z-index: 1000;
justify-content: center;
align-items: flex-end;
}
.modal-content {
width: 100%;
max-width: 500px;
background-color: var(--card-bg);
border-top-left-radius: 28px;
border-top-right-radius: 28px;
padding: 20px;
display: flex;
flex-direction: column;
gap: 12px;
max-height: 80vh;
}
.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
font-weight: bold;
}
.close-btn {
background: none; border: none; font-size: 1.5rem; color: #aaa; cursor: pointer;
}
.ai-box {
background: white; border: 1px solid #e1dbcf; border-radius: 12px;
padding: 12px; height: 200px; overflow-y: auto; font-size: 0.95rem; line-height: 1.6;
}
</style>
</head>
<body>
<div class="app-container">
<!-- 上方控制卡片 -->
<div class="selector-card">
<div class="dropdown-row">
<select id="book-select" class="custom-select">
<option value="GEN">📖 創世記</option>
<option value="JHN">📖 約翰福音</option>
</select>
<select id="api-key-select" class="custom-select" style="background-color: #ebdcc3; font-size: 0.8rem;">
<option value="">🔑 設定 DeepSeek Key</option>
</select>
</div>
<div class="history-tag" id="history-label">⏳ 上次：創世記 1:1</div>
<div class="chapters-scroll" id="chapters-list">
<!-- 由 JavaScript 動態渲染 -->
</div>
</div>
<!-- 和合本卡片 -->
<div class="bible-card">
<div class="version-title">📑 和合本 (CUV) · 附原文編號</div>
<div class="verse-list" id="zh-verses"></div>
</div>
<!-- 英文 KJV 卡片 -->
<div class="bible-card">
<div class="version-title">📜 King James Version (KJV)</div>
<div class="verse-list" id="en-verses"></div>
</div>
</div>
<!-- 底部懸浮導覽列 -->
<div class="bottom-nav">
<button class="nav-btn" onclick="alert('原文功能已就緒，請點選經文卡片！')">📖 原文詞典</button>
<button class="nav-btn" onclick="openAI()">🤖 AI 助理</button>
</div>
<!-- AI 助理視窗 -->
<div class="modal-overlay" id="ai-modal">
<div class="modal-content">
<div class="modal-header">
<span>🤖 DeepSeek 釋經助手</span>
<button class="close-btn" onclick="closeAI()">×</button>
</div>
<p style="font-size: 0.85rem; color: #888;" id="selected-target">當前未選擇經文</p>
<div style="display:flex; gap:6px;">
<button onclick="askAI('歷史背景')" style="flex:1; padding:8px; font-size:0.8rem; background:#b08968; color:white; border:none; border-radius:6px; cursor:pointer;">歷史背景</button>
<button onclick="askAI('神學義理')" style="flex:1; padding:8px; font-size:0.8rem; background:#b08968; color:white; border:none; border-radius:6px; cursor:pointer;">神學義理</button>
<button onclick="askAI('生活應用')" style="flex:1; padding:8px; font-size:0.8rem; background:#b08968; color:white; border:none; border-radius:6px; cursor:pointer;">生活應用</button>
</div>
<div class="ai-box" id="ai-output">請選擇上方分析維度進行提問...</div>
</div>
</div>
<script>
// 直接內嵌本機經文資料庫，完美繞過所有外部 API 與 CORS 錯誤限制！
const localBibleDatabase = {
"GEN": {
"name": "創世記",
"chapters": {
"1": [
{ v: 1, zh: "起初，神創造天地。", en: "In the beginning God created the heaven and the earth." },
{ v: 2, zh: "地是空虛混沌，淵面黑暗；神的靈運行在水面上。", en: "And the earth was without form, and void; and darkness was upon the face of the deep. And the Spirit of God moved upon the face of the waters." },
{ v: 3, zh: "神說：要有光，就有了光。", en: "And God said, Let there be light: and there was light." }
],
"2": [
{ v: 1, zh: "天地萬物都造齊了。", en: "Thus the heavens and the earth were finished, and all the host of them." }
]
}
},
"JHN": {
"name": "約翰福音",
"chapters": {
"3": [
{ v: 16, zh: "神愛世人，甚至將祂的獨生子賜給他們，叫一切信祂的，不至滅亡，反得永生。", en: "For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life." },
{ v: 17, zh: "因為神差祂的兒子降世，不是要定世人的罪，乃是要叫世人因祂得救。", en: "For God sent not his Son into the world to condemn the world; but that the world through him might be saved." }
]
}
}
};
let selectedVerseText = "";
let deepseekKey = localStorage.getItem("ds_key") || "";
const bookSelect = document.getElementById('book-select');
const chaptersList = document.getElementById('chapters-list');
const zhVerses = document.getElementById('zh-verses');
const enVerses = document.getElementById('en-verses');
const historyLabel = document.getElementById('history-label');
// 當切換書卷時，自動更新上方可選取的章節按鈕
function updateChapterButtons() {
chaptersList.innerHTML = '';
const bookCode = bookSelect.value;
const availableChapters = Object.keys(localBibleDatabase[bookCode].chapters);
availableChapters.forEach((ch, index) => {
let div = document.createElement('div');
div.className = ⁠chapter-num ${index === 0 ? 'active' : ''}⁠;
div.textContent = ch;
div.onclick = function() {
document.querySelectorAll('.chapter-num').forEach(el => el.classList.remove('active'));
this.classList.add('active');
displayVerses(bookCode, ch);
};
chaptersList.appendChild(div);
});
// 預設顯示該書卷的第一個可用章節
displayVerses(bookCode, availableChapters[0]);
}
// 把內嵌的資料直接渲染至畫面上
function displayVerses(bookCode, chapter) {
const bookData = localBibleDatabase[bookCode];
historyLabel.textContent = ⁠⏳ 上次：${bookData.name} ${chapter}章⁠;
zhVerses.innerHTML = '';
enVerses.innerHTML = '';
const verses = bookData.chapters[chapter] || [];
if (verses.length === 0) {
zhVerses.innerHTML = '<p style="text-align:center; color:#888;">此範例章節尚未內嵌資料。</p>';
enVerses.innerHTML = '<p style="text-align:center; color:#888;">請切換至 創世記第1章 或 約翰福音第3章 測試！</p>';
return;
}
verses.forEach(v => {
// 中文卡片
let zhItem = document.createElement('div');
zhItem.className = 'verse-item';
zhItem.innerHTML = ⁠<div class="v-num">${v.v}</div><div class="v-text">${v.zh}</div>⁠;
zhItem.onclick = function() {
document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('selected'));
this.classList.add('selected');
selectedVerseText = ⁠${bookData.name} ${chapter}章:${v.v}節 (${v.zh})⁠;
document.getElementById('selected-target').textContent = ⁠已選中：${selectedVerseText}⁠;
};
zhVerses.appendChild(zhItem);
// 英文卡片
let enItem = document.createElement('div');
enItem.className = 'verse-item';
enItem.innerHTML = ⁠<div class="v-num">${v.v}</div><div class="v-text">${v.en}</div>⁠;
enVerses.appendChild(enItem);
});
}
// AI 視窗操作
function openAI() { document.getElementById('ai-modal').style.display = 'flex'; }
function closeAI() { document.getElementById('ai-modal').style.display = 'none'; }
// 串接 DeepSeek API
async function askAI(type) {
if(!selectedVerseText) { alert("請先點擊經文卡片選擇要分析的經文！"); return; }
if(!deepseekKey) {
let k = prompt("請輸入您的 DeepSeek API Key (sk-...):");
if(k) { deepseekKey = k; localStorage.setItem("ds_key", k); } else return;
}
const output = document.getElementById('ai-output');
output.textContent = ⁠DeepSeek 正在針對【${type}】為您撰寫深度註釋，請稍候...⁠;
try {
const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'Authorization': ⁠Bearer ${deepseekKey}⁠
},
body: JSON.stringify({
model: "deepseek-chat",
messages: [
{ role: "system", content: "你是一位精通希伯來文、希臘文、系統神學與教會歷史的牧者聖經學者。請用溫和、嚴謹且條理清晰的分段方式回答。" },
{ role: "user", content: ⁠請針對經文【${selectedVerseText}】，提供詳盡的「${type}」釋義與神學解答。⁠ }
]
})
});
const data = await response.json();
output.textContent = data.choices[0].message.content;
} catch (e) {
output.textContent = "AI 查詢失敗。請檢查右上角輸入的 API Key 狀態，或確認帳戶額度。";
}
}
// 綁定右上角金鑰設定按鈕
document.getElementById('api-key-select').onclick = function() {
let k = prompt("請貼上您的 DeepSeek sk- 金鑰密鑰：", deepseekKey);
if(k !== null) { deepseekKey = k; localStorage.setItem("ds_key", k); }
};
// 啟動程序
bookSelect.onchange = updateChapterButtons;
updateChapterButtons();
</script>
</body>
</html>
