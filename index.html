<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>聖言研讀 · 雙譯本對照</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- FlexSearch -->
    <script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.31/dist/flexsearch.min.js"></script>
</head>
<body>
<div class="app">
    <div class="toolbar">
        <div class="row-selectors">
            <div class="selector-group"><i class="fas fa-scroll"></i><select id="bookSelect"></select></div>
            <div class="selector-group"><i class="fas fa-hashtag"></i><select id="chapterSelect"></select></div>
            <div class="progress-tag" id="progressLabel"></div>
        </div>
        <div class="chapter-scroll" id="chapterScroll"></div>
    </div>

    <div class="version-card" id="cuvCard">
        <div class="version-title"><i class="fas fa-bible"></i> 和合本 (CUV) · 附原文編號</div>
        <div id="cuvVerses">載入中...</div>
    </div>
    <div class="version-card" id="kjvCard">
        <div class="version-title"><i class="fas fa-scroll"></i> King James Version (KJV)</div>
        <div id="kjvVerses">載入中...</div>
    </div>

    <div id="searchPanel" class="search-panel">
        <input type="text" id="keywordInput" class="search-input" placeholder="輸入關鍵字搜尋 (和合本+ KJV 已讀經文)">
        <div id="searchResult"></div>
    </div>

    <div class="fab-container">
        <button class="fab" id="openLexiconBtn"><i class="fas fa-book-open"></i> 原文詞典</button>
        <button class="fab" id="openNoteBtn"><i class="fas fa-pen-fancy"></i> 筆記/書籤</button>
        <button class="fab" id="openSearchBtn"><i class="fas fa-search"></i> 搜尋</button>
        <button class="fab" id="openAiBtn"><i class="fas fa-robot"></i> AI 助理</button>
    </div>

    <div id="lexiconDrawer" class="drawer">
        <div class="drawer-header"><span><i class="fas fa-language"></i> Strong's 原文詞典</span><button class="close-drawer" data-drawer="lexicon">✕</button></div>
        <div class="drawer-content" id="lexiconContent">點擊經文中的編號顯示完整字義。</div>
    </div>

    <div id="noteDrawer" class="drawer">
        <div class="drawer-header"><span><i class="fas fa-paste"></i> 靈修筆記 · 書籤</span><button class="close-drawer" data-drawer="note">✕</button></div>
        <div class="drawer-content note-editor">
            <div><strong>目前經節：</strong> <span id="currentVerseRef">未選取</span></div>
            <textarea id="noteContent" rows="3" placeholder="寫下你的筆記..."></textarea>
            <button id="saveNote" class="small-btn">儲存筆記</button>
            <button id="addBookmark" class="small-btn">加入書籤</button>
            <hr><div><strong>📌 我的書籤</strong></div><div id="bookmarkList"></div>
            <hr><div><strong>📖 閱讀進度</strong></div><div id="progressDetail"></div>
        </div>
    </div>

    <div id="aiDrawer" class="drawer">
        <div class="drawer-header"><span><i class="fas fa-microchip"></i> DeepSeek 聖經 AI</span><button class="close-drawer" data-drawer="ai">✕</button></div>
        <div class="drawer-content">
            <div class="ai-conversation" id="aiChatLog"><div class="ai-msg">🤖 歡迎！可問聖經問題。</div></div>
            <textarea id="aiQuestion" rows="2" placeholder="例如：什麼是『因信稱義』？"></textarea>
            <button id="askAiBtn" class="small-btn">發問</button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
