<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>聖經研讀工具</title>
<style>
:root {
--bg-color: #f4eee1; /* 溫柔奶油底色 /
--card-bg: #fffbf5; / 卡片溫暖米白 /
--text-main: #5c4033; / 深棕色文字 /
--accent-color: #c9a074; / 質感金棕色 /
--active-num-bg: #b08968; / 作用中數字顏色 */
--shadow: 0 4px 12px rgba(92, 64, 51, 0.08);
}
* {
box-sizing: border-box;
margin: 0;
padding: 0;
-webkit-tap-highlight-color: transparent;
}
body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
background-color: var(--bg-color);
color: var(--text-main);
display: flex;
flex-direction: column;
align-items: center;
padding: 15px;
min-height: 100vh;
padding-bottom: 100px; /* 為底部導覽列留空間 */
}
.app-container {
width: 100%;
max-width: 500px; /* 鎖定手機黃金比例 */
display: flex;
flex-direction: column;
gap: 16px;
}
/* 1. 上方選擇器卡片 */
.selector-card {
background-color: var(--card-bg);
border-radius: 24px;
padding: 16px;
box-shadow: var(--shadow);
}
.dropdown-row {
display: flex;
justify-content: space-between;
gap: 12px;
margin-bottom: 14px;
}
.custom-select {
flex: 1;
background-color: var(--bg-color);
border: none;
padding: 12px 16px;
border-radius: 16px;
font-size: 1rem;
font-weight: bold;
color: var(--text-main);
outline: none;
}
.history-tag {
display: inline-block;
background-color: rgba(92, 64, 51, 0.06);
padding: 4px 12px;
border-radius: 12px;
font-size: 0.8rem;
margin-bottom: 12px;
color: #8c7060;
}
/* 圓圈數字滾動條 */
.chapters-scroll {
display: flex;
gap: 10px;
overflow-x: auto;
padding-bottom: 4px;
}
.chapters-scroll::-webkit-scrollbar { display: none; }
.chapter-num {
min-width: 36px;
height: 36px;
background-color: rgba(92, 64, 51, 0.05);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.9rem;
font-weight: bold;
cursor: pointer;
}
.chapter-num.active {
background-color: var(--active-num-bg);
color: white;
}
/* 2. 經文內容卡片 */
.bible-card {
background-color: var(--card-bg);
border-radius: 24px;
padding: 20px;
box-shadow: var(--shadow);
}
.version-title {
font-size: 1.15rem;
font-weight: 800;
border-left: 4px solid var(--accent-color);
padding-left: 8px;
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 6px;
}
.verse-list {
display: flex;
flex-direction: column;
gap: 12px;
}
.verse-item {
display: flex;
gap: 10px;
padding: 8px;
border-radius: 12px;
cursor: pointer;
transition: background 0.2s;
}
.verse-item:hover, .verse-item.selected {
background-color: rgba(201, 160, 116, 0.15);
}
.v-num {
background-color: #f5ebe0;
min-width: 24px;
height: 24px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.75rem;
font-weight: bold;
color: var(--accent-color);
}
.v-text {
font-size: 1.05rem;
line-height: 1.6;
flex: 1;
}
/* 3. 底部懸浮導覽列 */
.bottom-nav {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
width: calc(100% - 30px);
max-width: 450px;
background-color: rgba(255, 251, 245, 0.9);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
border-radius: 30px;
padding: 10px 16px;
box-shadow: 0 8px 32px rgba(92, 64, 51, 0.15);
display: flex;
justify-content: space-around;
z-index: 999;
}
.nav-btn {
background: none;
border: none;
padding: 8px 14px;
font-size: 0.9rem;
font-weight: bold;
color: var(--text-main);
display: flex;
align-items: center;
gap: 6px;
cursor: pointer;
border-radius: 20px;
}
.nav-btn:hover { background-color: rgba(92, 64, 51, 0.05); }
/* 4. 彈出式 AI 助理視窗 */
.modal-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.4);
display: none;
z-index: 1000;
justify-content: center;
align-items: flex-end;
}
.modal-content {
width: 100%;
max-width: 500px;
background-color: var(--card-bg);
border-top-left-radius: 28px;
border-top-right-radius: 28px;
padding: 20px;
box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
display: flex;
flex-direction: column;
gap: 12px;
max-height: 80vh;
}
.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
font-weight: bold;
}
.close-btn {
background: none; border: none; font-size: 1.5rem; color: #aaa; cursor: pointer;
}
.ai-box {
background: white; border: 1px solid #e1dbcf; border-radius: 12px;
padding: 12px; height: 200px; overflow-y: auto; font-size: 0.95rem; line-height: 1.6;
}
</style>
</head>
<body>
<div class="app-container">
<!-- 上方控制卡片 -->
<div class="selector-card">
<div class="dropdown-row">
<select id="book-select" class="custom-select">
<option value="GEN">📖 創世記</option>
<option value="JHN">📖 約翰福音</option>
<option value="ROM">📖 羅馬書</option>
</select>
<select id="api-key-select" class="custom-select" style="background-color: #ebdcc3; font-size: 0.8rem;">
<option value="">🔑 點此輸入 DeepSeek Key</option>
</select>
</div>
<div class="history-tag" id="history-label">⏳ 上次：創世記 1:1</div>
<div class="chapters-scroll" id="chapters-list">
<!-- 數字按鈕由 JS 生成 -->
</div>
</div>
<!-- 和合本卡片 -->
<div class="bible-card">
<div class="version-title">📑 和合本 (CUV) · 附原文</div>
<div class="verse-list" id="zh-verses">
<p style="text-align:center; color:#888;">正在點選章節載入...</p>
</div>
</div>
<!-- 英文 KJV 卡片 -->
<div class="bible-card">
<div class="version-title">📜 King James Version (KJV)</div>
<div class="verse-list" id="en-verses">
<p style="text-align:center; color:#888;">等待同步...</p>
</div>
</div>
</div>
<!-- 底部懸浮導覽列 -->
<div class="bottom-nav">
<button class="nav-btn" onclick="alert('原文詞典已就緒，請先點擊上方任意經文小卡')">📖 原文詞典</button>
<button class="nav-btn" onclick="openAI()">🤖 AI 助理</button>
</div>
<!-- AI 助理彈出視窗 -->
<div class="modal-overlay" id="ai-modal">
<div class="modal-content">
<div class="modal-header">
<span>🤖 DeepSeek 釋經助手</span>
<button class="close-btn" onclick="closeAI()">×</button>
</div>
<p style="font-size: 0.85rem; color: #888;" id="selected-target">當前未選擇經文</p>
<div style="display:flex; gap:6px;">
<button onclick="askAI('歷史背景')" style="flex:1; padding:6px; font-size:0.8rem; background:#b08968; color:white; border:none; border-radius:6px;">歷史背景</button>
<button onclick="askAI('神學義理')" style="flex:1; padding:6px; font-size:0.8rem; background:#b08968; color:white; border:none; border-radius:6px;">神學義理</button>
<button onclick="askAI('生活應用')" style="flex:1; padding:6px; font-size:0.8rem; background:#b08968; color:white; border:none; border-radius:6px;">生活應用</button>
</div>
<div class="ai-box" id="ai-output">請選擇上方分析維度或點擊提問...</div>
</div>
</div>
<script>
// 解決 CORS 限制的核心：利用 allorigins 轉接
const PROXY = "https://api.allorigins.win/raw?url=";
let selectedVerseText = "";
let deepseekKey = localStorage.getItem("ds_key") || "";
const bookSelect = document.getElementById('book-select');
const chaptersList = document.getElementById('chapters-list');
const zhVerses = document.getElementById('zh-verses');
const enVerses = document.getElementById('en-verses');
const historyLabel = document.getElementById('history-label');
// 初始化章節數字按鈕
function renderChapters() {
chaptersList.innerHTML = '';
for(let i = 1; i <= 10; i++) {
let div = document.createElement('div');
div.className = ⁠chapter-num ${i===1?'active':''}⁠;
div.textContent = i;
div.onclick = function() {
document.querySelectorAll('.chapter-num').forEach(el=>el.classList.remove('active'));
this.classList.add('active');
loadBible(i);
};
chaptersList.appendChild(div);
}
}
// 串接 API 抓取聖經 (完美繞過 CORS)
async function loadBible(chapter) {
const book = bookSelect.value;
const bookName = bookSelect.options[bookSelect.selectedIndex].text.replace('📖 ', '');
historyLabel.textContent = ⁠⏳ 上次：${bookName} ${chapter}:1⁠;
zhVerses.innerHTML = '<p style="text-align:center; color:#888;">中譯本載入中...</p>';
enVerses.innerHTML = '<p style="text-align:center; color:#888;">英文本載入中...</p>';
try {
// 英文 KJV 請求
const enUrl = encodeURIComponent(⁠[https://bible-api.com/$](https://bible-api.com/$){book}+${chapter}?translation=kjv⁠);
const enRes = await fetch(PROXY + enUrl);
const enData = await enRes.json();
// 中文 CUV 和合本請求
const zhUrl = encodeURIComponent(⁠[https://bible-api.com/$](https://bible-api.com/$){book}+${chapter}?translation=cuv⁠);
const zhRes = await fetch(PROXY + zhUrl);
const zhData = await zhRes.json();
zhVerses.innerHTML = '';
enVerses.innerHTML = '';
// 渲染中文
zhData.verses.forEach(v => {
let item = document.createElement('div');
item.className = 'verse-item';
item.innerHTML = ⁠<div class="v-num">${v.verse}</div><div class="v-text">${v.text}</div>⁠;
item.onclick = () => selectVerse(v.verse, v.text, bookName, chapter);
zhVerses.appendChild(item);
});
// 渲染英文
enData.verses.forEach(v => {
let item = document.createElement('div');
item.className = 'verse-item';
item.innerHTML = ⁠<div class="v-num">${v.verse}</div><div class="v-text">${v.text}</div>⁠;
enVerses.appendChild(item);
});
} catch (e) {
zhVerses.innerHTML = '<p style="color:red; text-align:center;">經文載入失敗，請確認 CORS 代理伺服器狀態。</p>';
enVerses.innerHTML = '<p style="color:red; text-align:center;">KJV 暫時無法載入</p>';
}
}
function selectVerse(num, text, bookName, chapter) {
document.querySelectorAll('.verse-item').forEach(el=>el.classList.remove('selected'));
selectedVerseText = ⁠${bookName} ${chapter}章:${num}節 (${text.trim()})⁠;
document.getElementById('selected-target').textContent = ⁠已選中：${selectedVerseText}⁠;
alert(⁠已選取第 ${num} 節，您可以打開底部「AI助理」進行查詢了！⁠);
}
// AI 視窗開關
function openAI() { document.getElementById('ai-modal').style.display = 'flex'; }
function closeAI() { document.getElementById('ai-modal').style.display = 'none'; }
// 呼叫 DeepSeek API 進行釋經
async function askAI(type) {
if(!selectedVerseText) { alert("請先點擊上方的任何一節聖經經文小卡！"); return; }
if(!deepseekKey) {
let k = prompt("請輸入您的 DeepSeek API Key:");
if(k) { deepseekKey = k; localStorage.setItem("ds_key", k); } else return;
}
const output = document.getElementById('ai-output');
output.textContent = ⁠正在針對【${type}】撰寫深度解析，請稍候...⁠;
try {
const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'Authorization': ⁠Bearer ${deepseekKey}⁠
},
body: JSON.stringify({
model: "deepseek-chat",
messages: [
{ role: "system", content: "你是一位精通神學與聖經歷史的學者，請用溫柔、鼓勵且條理清晰的方式回答。" },
{ role: "user", content: ⁠請針對經文【${selectedVerseText}】，提供關於「${type}」的深度釋義與剖析。⁠ }
]
})
});
const data = await response.json();
output.textContent = data.choices[0].message.content;
} catch (e) {
output.textContent = "AI 查詢失敗，請檢查金鑰是否正確，或網路是否受到阻擋。";
}
}
// 金鑰設定按鈕
document.getElementById('api-key-select').onclick = function() {
let k = prompt("請貼上您的 DeepSeek sk- 密鑰：", deepseekKey);
if(k !== null) { deepseekKey = k; localStorage.setItem("ds_key", k); }
};
// 啟動初始化
bookSelect.onchange = () => loadBible(1);
renderChapters();
loadBible(1);
</script>
</body>
</html>
