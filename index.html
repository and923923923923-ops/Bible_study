<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>聖言研讀 · 中英對照 · Strong's 原文編號</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f2ecdf; font-family: system-ui, 'Segoe UI', 'Noto Sans CJK TC', sans-serif; color: #2e2a24; padding: 12px 12px 90px 12px; }
        .app { max-width: 900px; margin: 0 auto; }
        .toolbar { background: #fffaf2; border-radius: 32px; box-shadow: 0 8px 18px rgba(0,0,0,0.08); padding: 12px 16px; margin-bottom: 16px; border: 1px solid #e7d8c4; }
        .row-selectors { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .selector-group { background: #f5ede2; border-radius: 40px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; }
        .selector-group i { color: #a88762; }
        select { background: transparent; border: none; font-size: 0.9rem; font-weight: 500; color: #4e3e2c; padding: 8px 4px; outline: none; }
        .version-toggles { display: flex; gap: 16px; margin-left: auto; }
        .version-toggles label { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #735e44; cursor: pointer; }
        .chapter-scroll { margin-top: 12px; overflow-x: auto; white-space: nowrap; }
        .chapter-list { display: inline-flex; gap: 8px; }
        .chap { background: #faf3e9; border-radius: 40px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; }
        .chap.active { background: #b69060; color: white; }
        .verses-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .version-card { flex: 1; min-width: 280px; background: #fffdf9; border-radius: 36px; margin-bottom: 20px; padding: 16px 18px; border: 1px solid #ecdfcf; box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .version-title { font-size: 1.3rem; font-weight: 700; color: #735e44; border-left: 5px solid #c7a16b; padding-left: 12px; margin-bottom: 12px; }
        .verse-item { display: flex; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #f2e6da; }
        .verse-number { width: 32px; background: #f4ede3; border-radius: 30px; text-align: center; font-size: 0.7rem; margin-right: 12px; cursor: pointer; flex-shrink: 0; }
        .verse-text { flex: 1; line-height: 1.5; }
        .strong { background: #e7dbcd; border-radius: 30px; padding: 2px 8px; font-size: 0.68rem; font-weight: 600; color: #6f543a; cursor: pointer; display: inline-block; margin: 0 2px; white-space: nowrap; }
        .strong:hover { background: #c6aa86; color: white; }
        .fab-container { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 14px; z-index: 100; flex-wrap: wrap; }
        .fab { background: #fef7ed; backdrop-filter: blur(12px); border-radius: 60px; padding: 10px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: none; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #fffbf2; border-radius: 32px 32px 0 0; transition: transform 0.3s; transform: translateY(100%); z-index: 200; max-height: 70vh; overflow-y: auto; }
        .drawer.open { transform: translateY(0); }
        .drawer-header { padding: 18px 20px 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #e9dbc9; }
        .close-drawer { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .drawer-content { padding: 18px 20px 30px; }
        textarea { width: 100%; padding: 12px; border-radius: 24px; margin: 12px 0; border: 1px solid #e3d2be; }
        .small-btn { background: #dfcfba; border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; margin-right: 8px; }
        .search-panel { background: #fff7ef; border-radius: 28px; margin-bottom: 16px; padding: 12px; display: none; }
        .search-panel.open { display: block; }
        .search-input { width: 100%; padding: 12px; border-radius: 40px; border: 1px solid #ddcfbb; }
        .progress-tag { background: #e7dfd1; border-radius: 24px; padding: 4px 12px; font-size: 0.7rem; display: inline-block; }
        .ai-conversation { max-height: 280px; overflow-y: auto; background: #faf5ec; border-radius: 24px; padding: 12px; margin-bottom: 12px; }
        .ai-question { background: #e7ddcf; border-radius: 20px; padding: 8px 12px; margin: 6px 0; }
        .ai-answer { background: #fff3e4; border-radius: 20px; padding: 8px 12px; margin: 6px 0; }
        .error-msg { color: #b00020; background: #ffe6e6; padding: 12px; border-radius: 24px; text-align: center; }
        .lexicon-entry { margin-bottom: 16px; padding: 12px; background: #f8f0e6; border-radius: 24px; }
    </style>
</head>
<body>
<div class="app">
    <div class="toolbar">
        <div class="row-selectors">
            <div class="selector-group"><i class="fas fa-scroll"></i><select id="bookSelect"></select></div>
            <div class="selector-group"><i class="fas fa-hashtag"></i><select id="chapterSelect"></select></div>
            <div class="version-toggles">
                <label><input type="checkbox" id="showCUV" checked> 和合本</label>
                <label><input type="checkbox" id="showWEB" checked> WEB (含Strong)</label>
            </div>
            <div class="progress-tag" id="progressLabel"></div>
        </div>
        <div class="chapter-scroll" id="chapterScroll"></div>
    </div>
    <div class="verses-grid" id="versesGrid"></div>
    <div id="searchPanel" class="search-panel"><input type="text" id="keywordInput" class="search-input" placeholder="🔍 搜尋中文聖經"><div id="searchResult"></div></div>
    <div class="fab-container">
        <button class="fab" id="openLexiconBtn"><i class="fas fa-book-open"></i> 原文詞典</button>
        <button class="fab" id="openNoteBtn"><i class="fas fa-pen-fancy"></i> 筆記</button>
        <button class="fab" id="openSearchBtn"><i class="fas fa-search"></i> 搜尋</button>
        <button class="fab" id="openAiBtn"><i class="fas fa-robot"></i> AI</button>
    </div>
    <div id="lexiconDrawer" class="drawer"><div class="drawer-header"><span>📖 Strong's 原文詞典</span><button class="close-drawer" data-drawer="lexicon">✕</button></div><div class="drawer-content" id="lexiconContent">點擊經文中的 Strong 編號（如 H430）查看原文解釋。</div></div>
    <div id="noteDrawer" class="drawer"><div class="drawer-header"><span>📝 靈修筆記</span><button class="close-drawer" data-drawer="note">✕</button></div><div class="drawer-content"><div>目前經節：<span id="currentVerseRef"></span></div><textarea id="noteContent" rows="3"></textarea><button id="saveNote" class="small-btn">儲存</button><button id="addBookmark" class="small-btn">書籤</button><div id="bookmarkList"></div></div></div>
    <div id="aiDrawer" class="drawer"><div class="drawer-header"><span>🤖 DeepSeek AI</span><button class="close-drawer" data-drawer="ai">✕</button></div><div class="drawer-content"><div class="ai-conversation" id="aiChatLog"></div><input type="password" id="apiKeyInput" placeholder="DeepSeek API Key (選填)"><button id="saveApiKey" class="small-btn">儲存</button><textarea id="aiQuestion" rows="2"></textarea><button id="askAiBtn" class="small-btn">發問</button></div></div>
</div>

<script src="https://raw.githubusercontent.com/xuan9/ChineseBibleSearchJS/master/bibleText.js"></script>
<script>
    // ========== 中文聖經解析 ==========
    let chineseVerses = {};
    let booksList = [];
    let chaptersMap = {};
    let fullBibleArray = [];
    
    function parseChineseBible() {
        if (typeof bibleText === 'undefined') { alert("無法載入中文聖經"); return false; }
        fullBibleArray = bibleText;
        const bookSet = new Set();
        const tempChapters = {};
        for (let line of fullBibleArray) {
            const m = line.match(/^([^\d]+)(\d+):(\d+)\s+(.*)$/);
            if (m) {
                let book = m[1].trim();
                let chap = parseInt(m[2]), verse = parseInt(m[3]), text = m[4];
                bookSet.add(book);
                const key = `${book}_${chap}`;
                if (!chineseVerses[key]) chineseVerses[key] = {};
                chineseVerses[key][verse] = text;
                if (!tempChapters[book] || tempChapters[book] < chap) tempChapters[book] = chap;
            }
        }
        booksList = Array.from(bookSet);
        const order = ["創世記","出埃及記","利未記","民數記","申命記","約書亞記","士師記","路得記","撒母耳記上","撒母耳記下","列王紀上","列王紀下","歷代志上","歷代志下","以斯拉記","尼希米記","以斯帖記","約伯記","詩篇","箴言","傳道書","雅歌","以賽亞書","耶利米書","耶利米哀歌","以西結書","但以理書","何西阿書","約珥書","阿摩司書","俄巴底亞書","約拿書","彌迦書","那鴻書","哈巴谷書","西番雅書","哈該書","撒迦利亞書","瑪拉基書","馬太福音","馬可福音","路加福音","約翰福音","使徒行傳","羅馬書","哥林多前書","哥林多後書","加拉太書","以弗所書","腓立比書","歌羅西書","帖撒羅尼迦前書","帖撒羅尼迦後書","提摩太前書","提摩太後書","提多書","腓利門書","希伯來書","雅各書","彼得前書","彼得後書","約翰一書","約翰二書","約翰三書","猶大書","啟示錄"];
        booksList.sort((a,b) => order.indexOf(a) - order.indexOf(b));
        for (let b of booksList) chaptersMap[b] = tempChapters[b] || 1;
        return true;
    }
    
    // ========== 英文書卷映射 ==========
    const bookMap = {
        "創世記":"Genesis","出埃及記":"Exodus","利未記":"Leviticus","民數記":"Numbers","申命記":"Deuteronomy",
        "約書亞記":"Joshua","士師記":"Judges","路得記":"Ruth","撒母耳記上":"1 Samuel","撒母耳記下":"2 Samuel",
        "列王紀上":"1 Kings","列王紀下":"2 Kings","歷代志上":"1 Chronicles","歷代志下":"2 Chronicles",
        "以斯拉記":"Ezra","尼希米記":"Nehemiah","以斯帖記":"Esther","約伯記":"Job","詩篇":"Psalms",
        "箴言":"Proverbs","傳道書":"Ecclesiastes","雅歌":"Song of Solomon","以賽亞書":"Isaiah","耶利米書":"Jeremiah",
        "耶利米哀歌":"Lamentations","以西結書":"Ezekiel","但以理書":"Daniel","何西阿書":"Hosea","約珥書":"Joel",
        "阿摩司書":"Amos","俄巴底亞書":"Obadiah","約拿書":"Jonah","彌迦書":"Micah","那鴻書":"Nahum","哈巴谷書":"Habakkuk",
        "西番雅書":"Zephaniah","哈該書":"Haggai","撒迦利亞書":"Zechariah","瑪拉基書":"Malachi","馬太福音":"Matthew",
        "馬可福音":"Mark","路加福音":"Luke","約翰福音":"John","使徒行傳":"Acts","羅馬書":"Romans","哥林多前書":"1 Corinthians",
        "哥林多後書":"2 Corinthians","加拉太書":"Galatians","以弗所書":"Ephesians","腓立比書":"Philippians","歌羅西書":"Colossians",
        "帖撒羅尼迦前書":"1 Thessalonians","帖撒羅尼迦後書":"2 Thessalonians","提摩太前書":"1 Timothy","提摩太後書":"2 Timothy",
        "提多書":"Titus","腓利門書":"Philemon","希伯來書":"Hebrews","雅各書":"James","彼得前書":"1 Peter","彼得後書":"2 Peter",
        "約翰一書":"1 John","約翰二書":"2 John","約翰三書":"3 John","猶大書":"Jude","啟示錄":"Revelation"
    };
    
    let currentBook = "創世記", currentChapter = 1, currentVerse = 1;
    let notes = JSON.parse(localStorage.getItem("bible_notes")||"{}");
    let bookmarks = JSON.parse(localStorage.getItem("bible_bookmarks")||"[]");
    let englishData = {};  // 存放英文經文（含 Strong）
    
    // 載入英文（含 Strong 編號）
    async function loadEnglishChapter() {
        const engBook = bookMap[currentBook];
        if (!engBook) return;
        const url = `https://bible.helloao.org/api/WEB/${engBook}/${currentChapter}.json`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data && data.chapter) englishData = data.chapter;
            else englishData = {};
        } catch(e) { englishData = {}; }
        renderAll();
    }
    
    // 渲染中文
    function renderChinese() {
        const key = `${currentBook}_${currentChapter}`;
        const verses = chineseVerses[key];
        if (!verses) return '<div class="error-msg">無經文</div>';
        let html = "";
        const nums = Object.keys(verses).sort((a,b)=>a-b);
        for (let v of nums) {
            let text = verses[v];
            text = text.replace(/神/g, '<span class="strong" data-strong="H430">神</span>');
            text = text.replace(/靈/g, '<span class="strong" data-strong="H7307">靈</span>');
            const sel = (currentVerse == v) ? 'style="background:#fff0e0; border-radius:20px; padding:4px;"' : '';
            html += `<div class="verse-item" ${sel}><span class="verse-number" data-verse="${v}">${v}</span><div class="verse-text">${text}</div></div>`;
        }
        return html;
    }
    
    // 渲染英文（保留 Strong 編號 HTML）
    function renderEnglish() {
        if (!englishData || Object.keys(englishData).length === 0) return '<div class="error-msg">載入英文中...</div>';
        let html = "";
        const nums = Object.keys(englishData).sort((a,b)=>a-b);
        for (let v of nums) {
            let text = englishData[v];
            // 將 Strong 編號轉為可點擊的 span
            text = text.replace(/\[([GH]\d+)\]/g, '<span class="strong" data-strong="$1">$1</span>');
            const sel = (currentVerse == v) ? 'style="background:#fff0e0; border-radius:20px; padding:4px;"' : '';
            html += `<div class="verse-item" ${sel}><span class="verse-number" data-verse="${v}">${v}</span><div class="verse-text">${text}</div></div>`;
        }
        return html;
    }
    
    function renderAll() {
        const showCUV = document.getElementById("showCUV").checked;
        const showWEB = document.getElementById("showWEB").checked;
        const grid = document.getElementById("versesGrid");
        grid.innerHTML = "";
        if (showCUV) {
            const card = document.createElement("div"); card.className = "version-card";
            card.innerHTML = `<div class="version-title">📖 和合本</div><div id="cuvContainer"></div>`;
            grid.appendChild(card);
            document.getElementById("cuvContainer").innerHTML = renderChinese();
        }
        if (showWEB) {
            const card = document.createElement("div"); card.className = "version-card";
            card.innerHTML = `<div class="version-title">📜 World English Bible (Strong's)</div><div id="webContainer"></div>`;
            grid.appendChild(card);
            document.getElementById("webContainer").innerHTML = renderEnglish();
        }
        attachEvents();
    }
    
    function attachEvents() {
        document.querySelectorAll(".strong").forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); showLexicon(el.getAttribute("data-strong")); };
        });
        document.querySelectorAll(".verse-number").forEach(el => {
            el.onclick = () => { currentVerse = parseInt(el.getAttribute("data-verse")); loadChapter(); loadNote(); updateProgress(); };
        });
    }
    
    // 原文詞典（簡易版，可擴充）
    const lexicon = {
        "H430": { original: "אֱלֹהִים", translit: "Elohim", meaning: "神，大能者，審判官", pos: "名詞 複數" },
        "H7307": { original: "רוּחַ", translit: "Ruach", meaning: "靈，風，氣息", pos: "名詞 陰性" },
        "G2316": { original: "θεός", translit: "Theos", meaning: "神，上帝", pos: "名詞" }
    };
    function showLexicon(strongId) {
        const entry = lexicon[strongId];
        const content = entry ? `<div class="lexicon-entry"><strong>${strongId}</strong><br>原文：${entry.original} (${entry.translit})<br>詞性：${entry.pos}<br>字義：${entry.meaning}</div>` : `<div>未收錄 ${strongId}，可詢問 AI 助手。</div>`;
        document.getElementById("lexiconContent").innerHTML = content;
        document.getElementById("lexiconDrawer").classList.add("open");
    }
    
    async function loadChapter() {
        const showWEB = document.getElementById("showWEB").checked;
        if (showWEB) await loadEnglishChapter();
        else renderAll();
        updateChapterSelector();
    }
    
    function loadNote() { const key = `${currentBook} ${currentChapter}:${currentVerse}`; document.getElementById("noteContent").value = notes[key]||""; document.getElementById("currentVerseRef").innerText = key; }
    function saveNote() { const key = `${currentBook} ${currentChapter}:${currentVerse}`; const c = document.getElementById("noteContent").value; if(c) notes[key]=c; else delete notes[key]; localStorage.setItem("bible_notes",JSON.stringify(notes)); alert("已儲存"); }
    function addBookmark() { const ref = `${currentBook} ${currentChapter}:${currentVerse}`; if(!bookmarks.includes(ref)) bookmarks.push(ref); localStorage.setItem("bible_bookmarks",JSON.stringify(bookmarks)); refreshBookmarks(); alert("已加入書籤"); }
    function refreshBookmarks() { const div = document.getElementById("bookmarkList"); div.innerHTML = bookmarks.map(ref => `<div onclick="jumpTo('${ref}')" style="cursor:pointer; margin:6px 0; background:#f8f0e6; border-radius:20px; padding:8px;">📖 ${ref}</div>`).join(""); if(!bookmarks.length) div.innerHTML="<div>尚無書籤</div>"; }
    window.jumpTo = function(ref) { const m = ref.match(/(.+?) (\d+):(\d+)/); if(m){ currentBook=m[1]; currentChapter=parseInt(m[2]); currentVerse=parseInt(m[3]); document.getElementById("bookSelect").value=currentBook; document.getElementById("chapterSelect").value=currentChapter; updateChapterSelector(); loadChapter(); loadNote(); updateProgress(); } };
    function updateProgress() { const last = `${currentBook} ${currentChapter}:${currentVerse}`; localStorage.setItem("lastRead",last); document.getElementById("progressLabel").innerHTML = `<i class="fas fa-history"></i> ${last}`; }
    
    function searchAll(kw) { if(!kw.trim()){ document.getElementById("searchResult").innerHTML=""; return; } const results = []; for(let line of fullBibleArray) if(line.toLowerCase().includes(kw.toLowerCase())){ results.push(line.substring(0,90)); if(results.length>=40) break; } const div=document.getElementById("searchResult"); if(!results.length) div.innerHTML="🔍 無結果"; else div.innerHTML=results.map(r=>`<div style="margin:6px 0; background:#f3e9dd; border-radius:20px; padding:8px;">🔍 ${r}</div>`).join(""); }
    
    // AI
    let apiKey = localStorage.getItem("deepseek_key")||"";
    document.getElementById("apiKeyInput").value=apiKey;
    document.getElementById("saveApiKey").onclick=()=>{ localStorage.setItem("deepseek_key",document.getElementById("apiKeyInput").value); apiKey=document.getElementById("apiKeyInput").value; alert("已儲存"); };
    document.getElementById("askAiBtn").onclick=async()=>{ const q=document.getElementById("aiQuestion").value.trim(); if(!q)return; if(!apiKey){ alert("請輸入 DeepSeek API Key"); return; } const chat=document.getElementById("aiChatLog"); chat.innerHTML+=`<div class="ai-question"><strong>你：</strong> ${q}</div>`; document.getElementById("aiQuestion").value=""; try{ const r=await fetch("https://api.deepseek.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},body:JSON.stringify({model:"deepseek-chat",messages:[{role:"user",content:`請用繁體中文回答聖經問題：${q}`}]})}); const d=await r.json(); const a=d.choices?.[0]?.message?.content||"無回應"; chat.innerHTML+=`<div class="ai-answer"><strong>AI：</strong> ${a}</div>`; chat.scrollTop=chat.scrollHeight; }catch(e){ chat.innerHTML+=`<div class="ai-answer">錯誤：${e.message}</div>`; } };
    
    function updateChapterSelector() {
        const max = chaptersMap[currentBook] || 30;
        const chapSel = document.getElementById("chapterSelect");
        chapSel.innerHTML = Array.from({length:max},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join("");
        chapSel.value = currentChapter;
        const scroll = document.getElementById("chapterScroll");
        scroll.innerHTML = `<div class="chapter-list">${Array.from({length:max},(_,i)=>`<div class="chap ${i+1===currentChapter?'active':''}" data-chap="${i+1}">${i+1}</div>`).join('')}</div>`;
        document.querySelectorAll(".chap").forEach(el => el.onclick = () => { currentChapter = parseInt(el.dataset.chap); document.getElementById("chapterSelect").value = currentChapter; loadChapter(); updateChapterSelector(); });
    }
    
    function init() {
        if(!parseChineseBible()) return;
        const bookSel = document.getElementById("bookSelect");
        bookSel.innerHTML = booksList.map(b=>`<option value="${b}">${b}</option>`).join("");
        bookSel.value = currentBook;
        bookSel.onchange = () => { currentBook = bookSel.value; currentChapter = 1; currentVerse = 1; updateChapterSelector(); loadChapter(); updateProgress(); };
        const chapSel = document.getElementById("chapterSelect");
        chapSel.onchange = () => { currentChapter = parseInt(chapSel.value); currentVerse = 1; loadChapter(); updateChapterSelector(); updateProgress(); };
        document.getElementById("showCUV").onchange = () => loadChapter();
        document.getElementById("showWEB").onchange = () => loadChapter();
        updateChapterSelector();
        loadChapter();
        updateProgress();
    }
    
    document.getElementById("openLexiconBtn").onclick = () => document.getElementById("lexiconDrawer").classList.add("open");
    document.getElementById("openNoteBtn").onclick = () => { document.getElementById("noteDrawer").classList.add("open"); refreshBookmarks(); loadNote(); };
    document.getElementById("openSearchBtn").onclick = () => document.getElementById("searchPanel").classList.toggle("open");
    document.getElementById("openAiBtn").onclick = () => document.getElementById("aiDrawer").classList.add("open");
    document.querySelectorAll(".close-drawer").forEach(btn => btn.onclick = () => document.getElementById(`${btn.dataset.drawer}Drawer`).classList.remove("open"));
    document.getElementById("saveNote").onclick = saveNote;
    document.getElementById("addBookmark").onclick = addBookmark;
    document.getElementById("keywordInput").addEventListener("input", e => searchAll(e.target.value));
    
    init();
    refreshBookmarks();
</script>
</body>
</html>
