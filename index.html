<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>測試聖經資料庫</title>
</head>
<body>
    <h2>測試 bibleText.js</h2>
    <div id="output">載入中...</div>

    <!-- 載入聖經資料庫（請確認 bibleText.js 在同一個資料夾） -->
    <script src="bibleText.js"></script>

    <script>
        // 檢查 bibleText 是否存在
        if (typeof bibleText === 'undefined') {
            document.getElementById('output').innerHTML = '錯誤：無法載入 bibleText.js，請確認檔案存在。';
        } else {
            // 解析經文，只顯示創世記第1章第1-5節
            let output = '<h3>創世記 1:1-5</h3><ul>';
            for (let i = 0; i < bibleText.length; i++) {
                let line = bibleText[i];
                // 格式例如 "創1:1 起初，神創造天地。"
                if (line.startsWith('創1:')) {
                    let parts = line.split(' ');
                    let verse = parts[0].split(':')[1];
                    let text = parts.slice(1).join(' ');
                    output += `<li><strong>${verse}</strong> ${text}</li>`;
                    if (verse === '5') break;
                }
            }
            output += '</ul><p>總共載入 ' + bibleText.length + ' 節經文。</p>';
            document.getElementById('output').innerHTML = output;
        }
    </script>
</body>
</html>
