<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>聖經研讀 · 穩定免費版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f2ecdf; font-family: system-ui; padding: 12px 12px 90px 12px; }
        .app { max-width: 700px; margin: 0 auto; }
        .toolbar { background: #fffaf2; border-radius: 32px; padding: 12px 16px; margin-bottom: 16px; box-shadow: 0 8px 18px rgba(0,0,0,0.08); }
        .row-selectors { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .selector-group { background: #f5ede2; border-radius: 40px; padding: 4px 12px; display: flex; align-items: center; gap: 8px; }
        select { background: transparent; border: none; font-size: 0.9rem; padding: 8px 4px; }
        .version-card { background: #fffdf9; border-radius: 36px; margin-bottom: 20px; padding: 16px 18px; box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .version-title { font-size: 1.35rem; font-weight: 700; color: #735e44; border-left: 5px solid #c7a16b; padding-left: 12px; margin-bottom: 12px; }
        .verse-item { display: flex; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #f2e6da; }
        .verse-number { width: 32px; background: #f4ede3; border-radius: 30px; text-align: center; font-size: 0.7rem; margin-right: 12px; cursor: pointer; }
        .verse-text { flex: 1; line-height: 1.5; }
        .strong { background: #e7dbcd; border-radius: 30px; padding: 2px 8px; font-size: 0.68rem; cursor: pointer; display: inline-block; margin: 0 2px; }
        .fab-container { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 14px; }
        .fab { background: #fef7ed; backdrop-filter: blur(12px); border-radius: 60px; padding: 10px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: none; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #fffbf2; border-radius: 32px 32px 0 0; transition: transform 0.3s; transform: translateY(100%); z-index: 200; max-height: 70vh; overflow-y: auto; }
        .drawer.open { transform: translateY(0); }
        .drawer-header { padding: 18px 20px 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #e9dbc9; }
        .close-drawer { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .drawer-content { padding: 18px 20px 30px; }
        textarea { width: 100%; padding: 12px; border-radius: 24px; margin: 12px 0; }
        .small-btn { background: #dfcfba; border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; }
        .search-panel { background: #fff7ef; border-radius: 28px; margin-bottom: 16px; padding: 12px; display: none; }
        .search-panel.open { display: block; }
        .search-input { width: 100%; padding: 12px; border-radius: 40px; border: 1px solid #ddcfbb; }
        .ai-conversation { max-height: 300px; overflow-y: auto; background: #faf5ec; border-radius: 24px; padding: 12px; margin-bottom: 12px; }
        .ai-question { background: #e7ddcf; border-radius: 20px; padding: 8px 12px; margin: 6px 0; }
        .ai-answer { background: #fff3e4; border-radius: 20px; padding: 8px 12px; margin: 6px 0; }
    </style>
</head>
<body>
<div class="app">
    <div class="toolbar">
        <div class="row-selectors">
            <div class="selector-group"><i class="fas fa-scroll"></i><select id="bookSelect"></select></div>
            <div class="selector-group"><i class="fas fa-hashtag"></i><select id="chapterSelect"></select></div>
        </div>
    </div>
    <div class="version-card"><div class="version-title">📖 和合本 (CUV) · 靜態API</div><div id="cuvVerses">載入中...</div></div>
    <div class="fab-container">
        <button class="fab" id="openNoteBtn">✏️ 筆記</button>
        <button class="fab" id="openSearchBtn">🔍 搜尋</button>
        <button class="fab" id="openAiBtn">🤖 AI</button>
    </div>
    <div id="noteDrawer" class="drawer"><div class="drawer-header"><span>筆記</span><button class="close-drawer" data-drawer="note">✕</button></div><div class="drawer-content"><textarea id="noteContent" rows="3"></textarea><button id="saveNote" class="small-btn">儲存</button></div></div>
    <div id="searchPanel" class="search-panel"><input type="text" id="keywordInput" class="search-input" placeholder="搜尋關鍵字"><div id="searchResult"></div></div>
    <div id="aiDrawer" class="drawer"><div class="drawer-header"><span>AI 助理</span><button class="close-drawer" data-drawer="ai">✕</button></div><div class="drawer-content"><div class="ai-conversation" id="aiChatLog"></div><input type="password" id="apiKeyInput" placeholder="DeepSeek API Key" style="width:100%; margin-bottom:8px;"><button id="saveApiKey" class="small-btn">儲存</button><textarea id="aiQuestion" rows="2"></textarea><button id="askAiBtn" class="small-btn">發問</button></div></div>
</div>
<script>
    // ---------- 靜態 API 網址模式 ----------
    // 書卷英文名映射（用於 API）
    const bookNameMap = {
        "創世記": "genesis", "出埃及記": "exodus", "利未記": "leviticus", "民數記": "numbers", "申命記": "deuteronomy",
        "約書亞記": "joshua", "士師記": "judges", "路得記": "ruth", "撒母耳記上": "1samuel", "撒母耳記下": "2samuel",
        "列王紀上": "1kings", "列王紀下": "2kings", "歷代志上": "1chronicles", "歷代志下": "2chronicles",
        "以斯拉記": "ezra", "尼希米記": "nehemiah", "以斯帖記": "esther", "約伯記": "job", "詩篇": "psalms",
        "箴言": "proverbs", "傳道書": "ecclesiastes", "雅歌": "songofsolomon", "以賽亞書": "isaiah",
        "耶利米書": "jeremiah", "耶利米哀歌": "lamentations", "以西結書": "ezekiel", "但以理書": "daniel",
        "何西阿書": "hosea", "約珥書": "joel", "阿摩司書": "amos", "俄巴底亞書": "obadiah", "約拿書": "jonah",
        "彌迦書": "micah", "那鴻書": "nahum", "哈巴谷書": "habakkuk", "西番雅書": "zephaniah", "哈該書": "haggai",
        "撒迦利亞書": "zechariah", "瑪拉基書": "malachi", "馬太福音": "matthew", "馬可福音": "mark",
        "路加福音": "luke", "約翰福音": "john", "使徒行傳": "acts", "羅馬書": "romans", "哥林多前書": "1corinthians",
        "哥林多後書": "2corinthians", "加拉太書": "galatians", "以弗所書": "ephesians", "腓立比書": "philippians",
        "歌羅西書": "colossians", "帖撒羅尼迦前書": "1thessalonians", "帖撒羅尼迦後書": "2thessalonians",
        "提摩太前書": "1timothy", "提摩太後書": "2timothy", "提多書": "titus", "腓利門書": "philemon",
        "希伯來書": "hebrews", "雅各書": "james", "彼得前書": "1peter", "彼得後書": "2peter", "約翰一書": "1john",
        "約翰二書": "2john", "約翰三書": "3john", "猶大書": "jude", "啟示錄": "revelation"
    };
    const books = Object.keys(bookNameMap);
    let currentBook = "創世記";
    let currentChapter = 1;
    let currentVerse = 1;
    let notes = JSON.parse(localStorage.getItem("bible_notes") || "{}");
    let cuvData = [];

    // 載入經文 (使用 github.io 靜態 JSON，保證無 CORS)
    async function loadChapter() {
        const bookEng = bookNameMap[currentBook];
        if (!bookEng) return;
        const url = `https://chinesebibleonline.github.io/api/cuv/${bookEng}/${currentChapter}.json`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            // data 格式: [{ verse: 1, text: "..." }, ...]
            cuvData = data;
            renderVerses(cuvData);
        } catch(e) {
            document.getElementById("cuvVerses").innerHTML = `<div style="color:#b00020;">無法載入經文：${e.message}<br>請確認書卷和章節正確。</div>`;
        }
    }

    function renderVerses(verses) {
        let html = "";
        verses.forEach(v => {
            let text = v.text;
            // 簡單標記「神」「靈」為 Strong 可點擊（示範）
            text = text.replace(/神/g, '<span class="strong" data-strong="H430">神</span>');
            text = text.replace(/靈/g, '<span class="strong" data-strong="H7307">靈</span>');
            const selected = currentVerse === v.verse ? 'style="background:#fff0e0; border-radius:20px;"' : '';
            html += `<div class="verse-item" ${selected}>
                        <span class="verse-number" data-verse="${v.verse}">${v.verse}</span>
                        <div class="verse-text">${text}</div>
                     </div>`;
        });
        document.getElementById("cuvVerses").innerHTML = html;
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll(".strong").forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); alert("Strong 編號 " + el.getAttribute("data-strong") + "\n原文詞典：可詢問 AI 助手獲得詳細解釋。"); };
        });
        document.querySelectorAll(".verse-number").forEach(el => {
            el.onclick = () => { currentVerse = parseInt(el.getAttribute("data-verse")); loadChapter(); loadNote(); };
        });
    }

    function loadNote() { const key = `${currentBook} ${currentChapter}:${currentVerse}`; document.getElementById("noteContent").value = notes[key] || ""; }
    function saveNote() { const key = `${currentBook} ${currentChapter}:${currentVerse}`; const content = document.getElementById("noteContent").value; if(content) notes[key] = content; else delete notes[key]; localStorage.setItem("bible_notes", JSON.stringify(notes)); alert("已儲存"); }
    
    // 簡單搜尋 (當前章節)
    document.getElementById("keywordInput").addEventListener("input", (e) => {
        const kw = e.target.value.toLowerCase();
        if(!kw || !cuvData) return;
        const results = cuvData.filter(v => v.text.toLowerCase().includes(kw)).map(v => `第${v.verse}節：${v.text.substring(0,80)}...`);
        document.getElementById("searchResult").innerHTML = results.map(r => `<div>🔍 ${r}</div>`).join("");
    });

    // AI 助理 (DeepSeek)
    let apiKey = localStorage.getItem("deepseek_key") || "";
    document.getElementById("apiKeyInput").value = apiKey;
    document.getElementById("saveApiKey").onclick = () => { localStorage.setItem("deepseek_key", document.getElementById("apiKeyInput").value); apiKey = document.getElementById("apiKeyInput").value; alert("已儲存"); };
    document.getElementById("askAiBtn").onclick = async () => {
        const q = document.getElementById("aiQuestion").value.trim();
        if(!q) return;
        if(!apiKey) { alert("請先輸入 API Key"); return; }
        const chat = document.getElementById("aiChatLog");
        chat.innerHTML += `<div class="ai-question"><strong>你：</strong> ${q}</div>`;
        document.getElementById("aiQuestion").value = "";
        try {
            const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "user", content: `請用繁體中文回答聖經問題：${q}` }] })
            });
            const data = await res.json();
            const ans = data.choices?.[0]?.message?.content || "無回應";
            chat.innerHTML += `<div class="ai-answer"><strong>AI：</strong> ${ans}</div>`;
            chat.scrollTop = chat.scrollHeight;
        } catch(e) { chat.innerHTML += `<div class="ai-answer">錯誤：${e.message}</div>`; }
    };

    // UI 初始化
    function initUI() {
        const bookSel = document.getElementById("bookSelect");
        bookSel.innerHTML = books.map(b => `<option value="${b}">${b}</option>`).join("");
        bookSel.value = currentBook;
        bookSel.onchange = () => { currentBook = bookSel.value; currentChapter = 1; loadChapter(); updateChapterSelect(); };
        const chapSel = document.getElementById("chapterSelect");
        function updateChapterSelect() {
            // 簡單預設每卷最多 50 章，可根據書卷調整
            const max = (currentBook === "詩篇") ? 150 : (currentBook === "創世記" ? 50 : 30);
            chapSel.innerHTML = Array.from({length: max}, (_,i) => `<option value="${i+1}">${i+1}</option>`).join("");
            chapSel.value = currentChapter;
            chapSel.onchange = () => { currentChapter = parseInt(chapSel.value); loadChapter(); };
        }
        updateChapterSelect();
        loadChapter();
    }

    document.getElementById("openNoteBtn").onclick = () => document.getElementById("noteDrawer").classList.add("open");
    document.getElementById("openSearchBtn").onclick = () => document.getElementById("searchPanel").classList.toggle("open");
    document.getElementById("openAiBtn").onclick = () => document.getElementById("aiDrawer").classList.add("open");
    document.querySelectorAll(".close-drawer").forEach(btn => btn.onclick = () => document.getElementById(`${btn.dataset.drawer}Drawer`).classList.remove("open"));
    document.getElementById("saveNote").onclick = saveNote;
    
    initUI();
</script>
</body>
</html>
